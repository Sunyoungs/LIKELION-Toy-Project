<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세</title>
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/detail.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-section-title">카테고리 설정</p>
        <ul class="detail-category-list">
          <li><label><input type="checkbox" value="학창시절"> 학창시절</label></li>
          <li><label><input type="checkbox" value="대중교통"> 대중교통</label></li>
          <li><label><input type="checkbox" value="관광명소"> 관광명소</label></li>
          <li><label><input type="checkbox" value="편의시설"> 편의시설</label></li>
        </ul>
      </div>
    </aside>
    <main class="main">
      <img class="detail-logo" src="../images/sideLogo.svg" alt="이음을 기다리는">

      <div class="detail-nav-bar">
        <span>전체보기</span>
        <span class="nav-sep">|</span>
        <span>최신순</span>
        <span class="nav-sep">|</span>
        <span class="detail-count">총 0개 중 0개</span>
        <div class="feed-nav">
          <button class="feed-nav-btn" id="prevPost">&lt;</button>
          <button class="feed-nav-btn" id="nextPost">&gt;</button>
        </div>
        <div id="ownerActions" hidden>
          <span class="owner-label">내 글인 경우에만</span>
          <button id="editBtn">수정하기</button>
          <button id="deleteBtn">삭제</button>
        </div>
      </div>

      <div class="detail-body">
        <div class="detail-left">
          <p class="loading">불러오는 중...</p>
        </div>
        <div class="detail-right"></div>
      </div>

      <dialog id="deleteModal">
        <p>정말 삭제하시겠습니까?</p>
        <button id="confirmDeleteBtn">삭제</button>
        <button id="cancelDeleteBtn">취소</button>
      </dialog>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script type="module" src="../js/detail.js"></script>
</body>
</html>
