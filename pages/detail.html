<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div> <!--정렬 및 카테고리 부분 우선 텍스트만 작성-->
        <p><strong>정렬</strong></p>
        <div>
          <button style="border: none;">최신순</button>
          <button style="border: none;">오래된순</button>
        </div>
        <br>
        <p><strong>카테고리</strong></p>
        <ul>
          <li>전체</li>
          <li>학창시절</li>
          <li>대중교통</li>
        </ul>
      </div> 
    </aside>
    <main class="main">
      <img src="../images/sideLogo-detail.svg">
      <br>
      
      <article id="postDetail">
        <p class="loading">불러오는 중...</p>
      </article>

      <!-- 본인 글일 때만 노출 (플로우차트의 본인 글 여부 분기) -->
      <div id="ownerActions" hidden>
        <button id="editBtn">수정</button>
        <button id="deleteBtn">삭제</button>
      </div>

      <!-- 삭제 확인 모달 (IA의 1.2.2) -->
      <dialog id="deleteModal">
        <p>정말 삭제하시겠습니까?</p>
        <button id="confirmDeleteBtn">삭제</button>
        <button id="cancelDeleteBtn">취소</button>
      </dialog>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script type="module" src="../js/detail.js"></script>
</body>
</html>
