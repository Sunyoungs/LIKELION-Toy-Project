<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>상세</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css" />
  <link rel="stylesheet" href="../css/detail.css" />
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div class="sort-section">
        <p class="sidebar-section-title">정렬</p>
        <div class="sort-group">
          <button class="sort-btn active" data-sort="newest">최신순</button>
          <button class="sort-btn" data-sort="oldest">오래된순</button>
        </div>
      </div>
      <div class="sidebar-section">
        <p class="sidebar-section-title">카테고리</p>
        <ul class="detail-category-list">
          <li>
            <label><input type="radio" name="category" value="학창시절" disabled> 학창시절</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="대학·모임" disabled> 대학·모임</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="동네·일상" disabled> 동네·일상</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="대중교통" disabled> 대중교통</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="식당" disabled> 식당</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="여행" disabled> 여행</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="직장·아르바이트" disabled> 직장·아르바이트</label>
          </li>
          <li>
            <label><input type="radio" name="category" value="기타" disabled> 기타</label>
          </li>
        </ul>
      </div>
      <div id="ownerActions" hidden>
        <button id="editBtn">수정하기</button>
        <button id="deleteBtn">삭제하기</button>
      </div>
    </aside>
    <main class="main">
      <img class="detail-logo" src="../images/articleLogo.svg" alt="이음을 기다리는">

      <div class="feed-header">
        <span id="sourceLabel">전체보기</span>
        <span id="detailSortLabel">최신순</span>
        <span class="detail-count" style="display:none"></span>
        <div class="feed-nav">
          <button class="feed-nav-btn" id="prevPost">&lt;</button>
          <button class="feed-nav-btn" id="nextPost">&gt;</button>
        </div>
      </div>

      <div class="detail-body">
        <div class="detail-left">
          <p class="loading">불러오는 중...</p>
        </div>
        <div class="detail-right"></div>
      </div>

      <dialog id="deleteModal">
        <div class="modal-header">
          <h3 class="modal-title">기록 삭제</h3>
          <button class="modal-close-btn" id="modalCloseBtn" type="button">✕</button>
        </div>
        <div class="modal-post-title" id="modalPostTitle"></div>
        <p class="modal-message">위 기록을 삭제하시겠어요?<br>삭제한 기록은 다시 복구할 수 없어요.</p>
        <div class="modal-actions">
          <button class="modal-cancel-btn" id="cancelDeleteBtn" type="button">취소</button>
          <button class="modal-confirm-btn" id="confirmDeleteBtn" type="button">삭제</button>
        </div>
      </dialog>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script type="module" src="../js/detail.js"></script>
</body>
</html>
