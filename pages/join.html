<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>회원가입</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/join.css">
</head>
<body>
  <main class="join-main">
    <a href="../index.html"><img src="../images/Logo.svg" style="margin-bottom: 30px;"></a>
    <div class="join-input">
      <input type="text" class="join-username" placeholder="이름을 입력하세요.">
      <br>
      <input type="password" class="join-password" placeholder="비밀번호를 입력하세요.">
      <br>
      <button class="join-btn">회원가입</button>
    </div>
    
  </main>

  <script src="../js/api.js"></script>
  <script>
    document.querySelector('.join-btn').addEventListener('click', async() => {
      const username = document.querySelector('.join-username').value;
      const password = document.querySelector('.join-password').value;

      if(!username || !password) return alert('이름과 비밀번호를 입력해주세요.');

      try {
        const result = await fetchAPI('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        
        alert('회원가입이 완료되었습니다.');
        window.location.href = './login.html';
      } catch (error) { alert(error.message); }
    });
  </script>
</body>
</html>
