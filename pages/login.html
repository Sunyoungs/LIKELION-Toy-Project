<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <div class="side">
    <p class="side-title">사이를 이음</p>
    <img src="../images/mainLogo.svg" style="width: 200px; margin: 20px 0px 40px 0px">
    <div class="side-sub">
      <p>우리에게 닿지 못한 인연이 여전히 존재합니다.</p>
      <p>스쳐 지나간 인연을 다시 찾아보세요.</p>
      <div class="side-var">|</div>
      <p>시절 인연 아카이브 서비스, 이음.</p>
    </div>
  </div>
  <div class="side-main">
    <main class="login-main">
      <img src="../images/login.svg" style="margin-bottom: 30px;">
      <div class="main-username">
        <label>아이디</label>
        <input type="text" class="login-username" placeholder="아이디 입력하기">
      </div>
      <div class="main-password">
        <label>비밀번호</label>
        <input type="password" class="login-password" placeholder="비밀번호 입력하기">
      </div>
      <div class="main-button">
        <button class="login-btn">로그인</button>
      </div>
      <div class="main-or">
        <span style="margin: 0px 10px"></span>
      </div>
      <div class="main-footer">
        <p>회원이 아니신가요?</p><a href="./join.html">회원가입</a>
      </div>
    </main>
  </div>


  <script src="../js/api.js"></script>
  <script>
    document.querySelector('.login-btn').addEventListener('click', async() => {
      const username = document.querySelector('.login-username').value;
      const password = document.querySelector('.login-password').value;

      if(!username || !password) return alert('아이디와 비밀번호를 입력해주세요.');
      
      try {
        const result = await fetchAPI('/users/login/', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        //console.log(result);

        localStorage.setItem('accessToken', result.access_token ?? result.access);
        localStorage.setItem('refreshToken', result.refresh_token ?? result.refresh);
        localStorage.setItem('username', username);
        alert('로그인에 성공했습니다!');
        window.location.href = '../index.html';
      } catch (error) { alert(error.message); }
    });
  </script>
</body>
</html>
