<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  <main class="login-main">
    <a href="../index.html"><img src="../images/Logo.svg" style="margin-bottom: 30px;"></a>
    <div class="login-input">
      <input type="text" class="login-username" placeholder="이름을 입력하세요.">
      <br>
      <input type="password" class="login-password" placeholder="비밀번호를 입력하세요.">
      <br>
      <button class="login-btn">로그인</button>
      <br>
      <a href="./join.html" class="go-join">회원가입하기</a>
    </div>
  </main>

  <script src="../js/api.js"></script>
  <script>
    document.querySelector('.login-btn').addEventListener('click', async() => {
      const username = document.querySelector('.login-username').value;
      const password = document.querySelector('.login-password').value;

      if(!username || !password) return alert('이름과 비밀번호를 입력해주세요.');
      
      try {
        const result = await fetchAPI('/users/login/', {
          method: 'POST',
          body: JSON.stringify({ username, password })
        });
        //console.log(result);

        localStorage.setItem('accessToken', result.access);
        localStorage.setItem('refreshToken', result.refresh);
        localStorage.setItem('username', username);
        alert('로그인에 성공했습니다!');
        window.location.href = '../index.html';
      } catch (error) { alert(error.message); }
    });
  </script>
</body>
</html>
