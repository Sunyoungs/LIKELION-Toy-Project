<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
        <a href="../pages/write.html">작성하기</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div class="sort-section">
        <p class="sidebar-section-title">정렬</p>
        <div class="sort-group">
          <button class="sort-btn active" data-sort="newest">최신순</button>
          <button class="sort-btn" data-sort="oldest">오래된순</button>
        </div>
      </div>
      <div class="profile-info">
        <p class="profile-info-title">내 정보</p>
        <div class="info-row">
          <span class="info-label">아이디</span>
          <span class="info-value profile-username"></span>
        </div>
        <div class="info-row">
          <span class="info-label">SNS</span>
          <div class="info-value sns-links"></div>
          <button type="button" class="sns-edit-btn btn-link">수정</button>
        </div>
        <div class="sns-edit-form">
          <input type="text" id="snsInput" placeholder="SNS URL 입력">
          <div class="sns-edit-actions">
            <button type="button" class="sns-save-btn">저장</button>
            <button type="button" class="sns-cancel-btn btn-link">취소</button>
          </div>
        </div>
        <div class="account-actions">
          <button class="logout-btn btn-link">로그아웃</button>
          <button class="withdraw-btn">회원탈퇴</button>
        </div>
      </div>
    </aside>
    <main class="main">
      <img src="../images/sideLogo-profile.svg">
      <br>
      <div class="feed-header">
        <span>내가 올린 글</span>
        <span>최신순</span>
        <span class="feed-total">총 0개</span>
        <div class="feed-nav">
          <button class="feed-nav-btn">&lt;</button>
          <button class="feed-nav-btn">&gt;</button>
        </div>
      </div>
      <div id="feedList"></div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script type="module" src="../js/profile.js"></script>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      alert('로그인이 필요한 서비스입니다.\n먼저 로그인을 진행해주세요.');
      window.location.href = './login.html';
    }

    document.querySelector('.logout-btn').addEventListener('click', async () => {
      const refreshToken = localStorage.getItem('refreshToken');
      try {
        await fetchAPI('/users/logout/', {
          method: 'POST',
          body: JSON.stringify({ refresh_token: localStorage.getItem('refreshToken') })
        });
      } catch (e) { /* 토큰 만료 등 에러여도 로컬 정리 진행 */ }
      localStorage.removeItem('accessToken');
      localStorage.removeItem('refreshToken');
      localStorage.removeItem('username');
      alert('로그아웃되었습니다.\n로그인 화면으로 이동합니다.');
      window.location.href = './login.html';
    });

    document.querySelector('.withdraw-btn').addEventListener('click', async () => {
      if (!confirm('정말 탈퇴하시겠습니까?\n모든 게시글과 데이터가 삭제됩니다.')) return;
      try {
        await fetchAPI('/users/withdraw/', { method: 'DELETE' });
        localStorage.clear();
        alert('탈퇴가 완료되었습니다.');
        window.location.href = './login.html';
      } catch (e) {
        console.warn('서버 지연 발생: ', e);
        localStorage.clear();
        alert('탈퇴가 완료되었습니다.');
        window.location.href = './login.html';
      }
    });
  </script>
</body>
</html>
