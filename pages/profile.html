<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/profile.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div class="profile-info">
        <p class="profile-info-title">내 정보</p>
        <div class="info-row">
          <span class="info-label">아이디</span>
          <span class="info-value profile-username"></span>
        </div>
        <div class="info-row">
          <span class="info-label">비밀번호</span>
          <button class="btn-link">변경</button>
        </div>
        <button class="logout-btn btn-link" style="margin-top: 12px;">로그아웃</button>
        <button class="withdraw-btn">회원탈퇴</button>
      </div>
    </aside>
    <main class="main">
      <img src="../images/sideLogo.svg">
      <br>
      <div class="feed-header">
        <span>내가 올린 글</span>
        <span>최신순</span>
        <span class="feed-total">총 0개</span>
        <div class="feed-nav">
          <button class="feed-nav-btn">&lt;</button>
          <button class="feed-nav-btn">&gt;</button>
        </div>
      </div>
      <div id="feedList"></div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script type="module" src="../js/profile.js"></script>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      alert('로그인이 필요한 서비스입니다.\n먼저 로그인을 진행해주세요.');
      window.location.href = './login.html';
    } else {
      const profileUsername = localStorage.getItem('username');
      if (profileUsername) {
        document.querySelector('.profile-username').textContent = profileUsername;
      }

      document.querySelector('.logout-btn').addEventListener('click', () => {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        localStorage.removeItem('username');
        alert('로그아웃되었습니다.\n로그인 화면으로 이동합니다.');
        window.location.href = './login.html';
      });
    }
  </script>
</body>
</html>
