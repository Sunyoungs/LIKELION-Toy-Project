<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>프로필</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="../index.html"><img src="../images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="../index.html">메인피드</a>
        <a href="../pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="../images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div> <!--정렬 및 카테고리 부분 우선 텍스트만 작성-->
        <p><strong>정렬</strong></p>
        <div>
          <button style="border: none;">최신순</button>
          <button style="border: none;">오래된순</button>
        </div>
        <br>
        <p><strong>카테고리</strong></p>
        <ul>
          <li>전체</li>
          <li>학창시절</li>
          <li>대중교통</li>
        </ul>
      </div> 
    </aside>
    <main class="main">
      <img src="../images/sideLogo-profile.svg">
      <br>
      
      <h1>마이페이지</h1>
      <p>안녕하세요, <strong class="profile-username"></strong>님!</strong></p>
      <br>
      <button class="logout-btn">로그아웃</button>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script>
    const token = localStorage.getItem('accessToken');
    if (!token) {
      alert('로그인이 필요한 서비스입니다.\n먼저 로그인을 진행해주세요.');
      window.location.href = './login.html';
    } else {
      const profileUsername = localStorage.getItem('username');
      if (profileUsername) { document.querySelector('.profile-username').textContent = profileUsername; }

      document.querySelector('.logout-btn').addEventListener('click', () => {
        localStorage.removeItem('accessToken');
        localStorage.removeItem('refreshToken');
        localStorage.removeItem('username');
        alert('로그아웃되었습니다.\n로그인 화면으로 이동합니다.');
        window.location.href = './login.html';
      });
    }
  </script>
</body>
</html>
