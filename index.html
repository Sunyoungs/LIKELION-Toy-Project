<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>홈 화면</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="./css/feed.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <a href="./index.html"><img src="./images/Logo.svg"></a>
      <nav class="sidebar-nav">
        <a href="./index.html">메인피드</a>
        <a href="./pages/profile.html">마이페이지</a>
      </nav>
      <div class="sidebar-search">
        <input type="text" id="searchInput" placeholder="장소 등 떠오르는 키워드 입력하기">
        <button type="submit"><img src="./images/arrow.svg" style="width: 12px;"></button>
      </div>
      <div>
        <p class="sidebar-section-title">정렬</p>
        <div class="sort-group">
          <button class="sort-btn active" data-sort="newest">최신순</button>
          <button class="sort-btn" data-sort="oldest">오래된순</button>
        </div>
      </div>
      <div>
        <p class="sidebar-section-title">카테고리</p>
        <ul class="category-list">
          <li class="category-item active" data-category="">
            <span>전체</span>
            <span class="category-count">-</span>
          </li>
          <li class="category-item" data-category="학창시절">
            <span>학창시절</span>
            <span class="category-count">-</span>
          </li>
          <li class="category-item" data-category="대중교통">
            <span>대중교통</span>
            <span class="category-count">-</span>
          </li>
          <li class="category-item" data-category="관광명소">
            <span>관광명소</span>
            <span class="category-count">-</span>
          </li>
          <li class="category-item" data-category="편의시설">
            <span>편의시설</span>
            <span class="category-count">-</span>
          </li>
        </ul>
      </div>
    </aside>
    <main class="main">
      <img src="./images/sideLogo.svg">
      <br>
      <div class="feed-header">
        <span>전체보기</span>
        <span id="feedSortLabel">최신순</span>
        <span class="feed-total" id="feedTotal">총 0개</span>
        <div class="feed-nav">
          <button class="feed-nav-btn">&lt;</button>
          <button class="feed-nav-btn">&gt;</button>
        </div>
      </div>
      <div id="feedList"></div>
    </main>
  </div>

  <script src="./js/api.js"></script>
  <script type="module" src="./js/feed.js"></script>
</body>
</html>
